name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug structure
        run: |
          ls -la
          ls -la code

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: code/package-lock.json

      - name: Install dependencies
        working-directory: ./code
        run: npm ci

      - name: Build
        working-directory: ./code
        run: npm run build

      - name: Create package
        run: |
          mkdir deploy
          cp -r code/dist deploy/
          cp code/package*.json deploy/
          cp code/ecosystem.config.cjs deploy/ || true
          tar -czf deploy.tar.gz -C deploy .

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.tar.gz